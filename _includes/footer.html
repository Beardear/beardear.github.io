<script>
// ── Theme toggle ──────────────────────────────────────────────────────────────
(function() {
  var icons = { light: 'fa-sun', dark: 'fa-moon', system: 'fa-circle-half-stroke' };

  function applyTheme(theme) {
    if (theme === 'system') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
    localStorage.setItem('theme', theme);

    var iconEl = document.getElementById('themeToggleIcon');
    if (iconEl) {
      iconEl.className = 'fas ' + icons[theme];
    }

    document.querySelectorAll('[data-theme-option]').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-theme-option') === theme);
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('theme') || 'system';
    applyTheme(saved);

    var btn = document.getElementById('themeToggleBtn');
    var menu = document.getElementById('themeMenu');

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      menu.classList.toggle('open');
    });

    document.addEventListener('click', function() {
      menu.classList.remove('open');
    });

    document.querySelectorAll('[data-theme-option]').forEach(function(optBtn) {
      optBtn.addEventListener('click', function() {
        applyTheme(this.getAttribute('data-theme-option'));
        menu.classList.remove('open');
      });
    });
  });
})();

// ── Scroll-spy ────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  const navLinks = document.querySelectorAll('.section-nav a');
  const sections = document.querySelectorAll('.content-section');

  function updateActive() {
    let current = '';
    const nearBottom = (window.scrollY + window.innerHeight) >= (document.documentElement.scrollHeight - 10);

    if (nearBottom) {
      current = sections[sections.length - 1].getAttribute('id');
    } else {
      sections.forEach(function(section) {
        if (window.scrollY >= section.offsetTop - 160) {
          current = section.getAttribute('id');
        }
      });
    }

    navLinks.forEach(function(link) {
      link.classList.remove('active');
      var href = link.getAttribute('href').replace(/^\/?#/, '');
      if (href === current) {
        link.classList.add('active');
      }
    });
  }

  navLinks.forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const targetId = this.getAttribute('href').slice(1);
      const target = document.getElementById(targetId);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });

  window.addEventListener('scroll', updateActive);
  updateActive();
});
</script>
